services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: chapters
      POSTGRES_PASSWORD: chapters
      POSTGRES_DB: chapters
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chapters']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
