<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Collaboration · Sequence</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">User flow — Chapters</p>
    <h1>Live Collaboration</h1>

    <svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
          </marker>
          <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/>
          </marker>
        </defs>

        <!-- Background: clean paper, no texture -->
        <rect width="100%" height="100%" fill="#f5f5f5"/>

        <!-- =================================================================
             LIFELINES — dashed vertical lines from each actor.
             Actor lifeline x-coords: User A=128, Sync Relay=352, User B=584, Vault Owner=800
             ================================================================= -->
        <line x1="128" y1="128" x2="128" y2="624" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="352" y1="128" x2="352" y2="624" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="584" y1="128" x2="584" y2="624" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="800" y1="128" x2="800" y2="624" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="3,3"/>

        <!-- =================================================================
             ACTIVATION BAR — Sync Relay, bracketing the enforcement window:
             from the next inbound op arriving (y456) to the downgrade departing (y556).
             ================================================================= -->
        <rect x="348" y="448" width="8" height="116" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>

        <!-- =================================================================
             MESSAGE ARROWS — time flows top→down.
             ================================================================= -->

        <!-- 1: User A → Sync Relay — opens note, edit permission, live CRDT connection -->
        <line x1="128" y1="176" x2="352" y2="176" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>

        <!-- 2: Sync Relay → User A — synced, presence color + cursor broadcast on -->
        <line x1="352" y1="216" x2="128" y2="216" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

        <!-- 3: User B → Sync Relay — opens same note, read-only permission -->
        <line x1="584" y1="256" x2="352" y2="256" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>

        <!-- 4: Sync Relay → User B — live stream, no cursor, body + frontmatter locked -->
        <line x1="352" y1="296" x2="584" y2="296" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

        <!-- 5: User A → Sync Relay — types an edit -->
        <line x1="128" y1="336" x2="352" y2="336" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- 6: Sync Relay → User B — CRDT-merged edit streamed live, attributed to User A -->
        <line x1="352" y1="376" x2="584" y2="376" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- 7: Vault Owner → Sync Relay — revokes User A's edit share, mid-session (crosses User B's lifeline) -->
        <line x1="800" y1="416" x2="352" y2="416" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- 8: User A → Sync Relay — the very next inbound operation, socket still open, unaware of revocation -->
        <line x1="128" y1="456" x2="352" y2="456" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

        <!-- 9: Sync Relay self-check — validates permission on THIS operation, not just at connect. THE focal moment. -->
        <path d="M 360 468 L 392 468 L 392 500 L 360 500" fill="none" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

        <!-- 10: Sync Relay → User A — kicked / downgraded to read-only, immediately, server-side -->
        <line x1="352" y1="556" x2="128" y2="556" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

        <!-- 11: Sync Relay → User B — unaffected, live state continues -->
        <line x1="352" y1="596" x2="584" y2="596" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

        <!-- =================================================================
             MESSAGE LABELS — opaque paper masks behind every label.
             ================================================================= -->

        <rect x="200" y="164" width="80" height="12" rx="2" fill="#f5f5f5"/>
        <text x="240" y="174" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">OPEN · EDIT</text>

        <rect x="200" y="204" width="80" height="12" rx="2" fill="#f5f5f5"/>
        <text x="240" y="214" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CURSOR LIVE</text>

        <rect x="428" y="244" width="80" height="12" rx="2" fill="#f5f5f5"/>
        <text x="468" y="254" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">OPEN · READ</text>

        <rect x="428" y="284" width="80" height="12" rx="2" fill="#f5f5f5"/>
        <text x="468" y="294" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">LOCKED VIEW</text>

        <rect x="212" y="324" width="56" height="12" rx="2" fill="#f5f5f5"/>
        <text x="240" y="334" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">EDIT OP</text>

        <rect x="432" y="364" width="72" height="12" rx="2" fill="#f5f5f5"/>
        <text x="468" y="374" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CRDT MERGE</text>

        <rect x="640" y="404" width="80" height="12" rx="2" fill="#f5f5f5"/>
        <text x="680" y="414" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">REVOKE EDIT</text>

        <rect x="212" y="444" width="56" height="12" rx="2" fill="#f5f5f5"/>
        <text x="240" y="454" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">EDIT OP</text>

        <!-- self-check label, right of the loop — coral, the crux of the diagram -->
        <rect x="400" y="472" width="88" height="12" rx="2" fill="#f5f5f5"/>
        <text x="444" y="482" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">VALIDATE PERM</text>

        <rect x="204" y="544" width="72" height="12" rx="2" fill="#f5f5f5"/>
        <text x="240" y="554" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">DOWNGRADED</text>

        <rect x="434" y="584" width="68" height="12" rx="2" fill="#f5f5f5"/>
        <text x="468" y="594" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">UNCHANGED</text>

        <!-- =================================================================
             ACTOR BOXES — drawn after arrows/labels.
             ================================================================= -->

        <!-- User A (editor) — input/user treatment -->
        <rect x="56" y="72" width="144" height="56" rx="6" fill="#f5f5f5"/>
        <rect x="56" y="72" width="144" height="56" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
        <rect x="64" y="80" width="32" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
        <text x="80" y="89" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EDIT</text>
        <text x="128" y="104" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User A</text>
        <text x="128" y="119" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">editor</text>

        <!-- Sync Relay (CRDT engine) — backend treatment -->
        <rect x="272" y="72" width="160" height="56" rx="6" fill="#f5f5f5"/>
        <rect x="272" y="72" width="160" height="56" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="280" y="80" width="32" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.22)" stroke-width="0.8"/>
        <text x="296" y="89" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CRDT</text>
        <text x="352" y="104" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Sync Relay</text>
        <text x="352" y="119" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">CRDT engine</text>

        <!-- User B (read-only viewer) — restricted / dashed treatment -->
        <rect x="512" y="72" width="144" height="56" rx="6" fill="#f5f5f5"/>
        <rect x="512" y="72" width="144" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
        <rect x="520" y="80" width="32" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.22)" stroke-width="0.8"/>
        <text x="536" y="89" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">VIEW</text>
        <text x="584" y="104" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User B</text>
        <text x="584" y="119" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">viewer</text>

        <!-- Vault Owner — external treatment -->
        <rect x="728" y="72" width="144" height="56" rx="6" fill="#f5f5f5"/>
        <rect x="728" y="72" width="144" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
        <rect x="736" y="80" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.22)" stroke-width="0.8"/>
        <text x="756" y="89" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OWNER</text>
        <text x="800" y="104" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Vault Owner</text>
        <text x="800" y="119" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">access control</text>

        <!-- =================================================================
             ANNOTATION CALLOUT — the one insight this diagram exists to deliver.
             Neutral ink (coral budget already spent on the check + the kick).
             ================================================================= -->
        <text x="420" y="436" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', serif" text-anchor="start">checked on every op —</text>
        <text x="420" y="452" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', serif" text-anchor="start">not just at connect</text>
        <path d="M 402 458 Q 380 464 362 468" fill="none" stroke="rgba(45,49,66,0.40)" stroke-width="1" stroke-dasharray="4,3"/>
        <circle cx="360" cy="468" r="2" fill="#2d3142"/>

        <!-- =================================================================
             LEGEND — horizontal strip at the bottom.
             ================================================================= -->
        <line x1="56" y1="648" x2="944" y2="648" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
        <text x="56" y="664" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <!-- Item 1: permission enforcement (coral) -->
        <line x1="56" y1="692" x2="84" y2="692" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
        <text x="92" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Permission enforced</text>

        <!-- Item 2: activation bar -->
        <rect x="248" y="684" width="4" height="18" fill="rgba(45,49,66,0.06)" stroke="#4f5d75" stroke-width="0.8"/>
        <text x="260" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Relay processing</text>

        <!-- Item 3: connect (link-blue) -->
        <line x1="424" y1="692" x2="452" y2="692" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
        <text x="460" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Connect / open</text>

        <!-- Item 4: live stream / return (muted dashed) -->
        <line x1="600" y1="692" x2="628" y2="692" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
        <text x="636" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Live stream</text>

        <!-- Item 5: restricted actor (dashed box) -->
        <rect x="772" y="686" width="14" height="12" rx="2" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
        <text x="794" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Read-only actor</text>

      </svg>
  </div>
</body>
</html>
