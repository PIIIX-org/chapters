<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Data Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1240px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--color-muted);
      margin-bottom: 1.5rem;
      max-width: 640px;
    }

    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture — Chapters</p>
    <h1>System Data Flow</h1>
    <p class="subtitle">One permission gate for every write and query. One plain-file store underneath, shared by humans and AI agents alike.</p>

    <svg viewBox="0 0 1240 1020" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-start" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- ============ ARROWS (drawn before boxes) ============ -->

      <!-- A1: Editor <-> CRDT Sync Relay (bidirectional, live edits) -->
      <line x1="200" y1="120" x2="310" y2="352" stroke="#4f5d75" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow)"/>
      <rect x="220" y="224" width="72" height="12" rx="2" fill="#f5f5f5"/>
      <text x="256" y="233" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">LIVE EDITS</text>

      <!-- A2: AI Agent -> App/Auth Server (external MCP call) -->
      <line x1="1060" y1="120" x2="700" y2="196" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <rect x="844" y="148" width="72" height="12" rx="2" fill="#f5f5f5"/>
      <text x="880" y="157" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">MCP CALL</text>

      <!-- A3: App/Auth Server -> Postgres (permission + session check) -->
      <line x1="740" y1="272" x2="900" y2="352" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="780" y="300" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="820" y="309" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">AUTH CHECK</text>

      <!-- A4: App/Auth Server -> CRDT Sync Relay (AI/MCP writes routed in, validated per-op) -->
      <line x1="500" y1="272" x2="390" y2="352" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="404" y="300" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="444" y="309" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">MCP WRITE</text>

      <!-- A5: CRDT Sync Relay -> Note Store (persist on save) -->
      <line x1="310" y1="416" x2="540" y2="496" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="392" y="444" width="64" height="12" rx="2" fill="#f5f5f5"/>
      <text x="424" y="453" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">PERSIST</text>

      <!-- A6: Note Store -> Embedding Index (recompute on save) -->
      <line x1="620" y1="572" x2="620" y2="652" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="588" y="600" width="64" height="12" rx="2" fill="#f5f5f5"/>
      <text x="620" y="609" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">ON SAVE</text>

      <!-- A7: Note Store -> Graph Engine (explicit links + frontmatter for structural inferred edges) -->
      <polyline points="460,534 270,534 270,796" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="324" y="512" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="364" y="521" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">EXTRACTED</text>

      <!-- A8: Embedding Index -> Graph Engine (semantic inferred edges) -->
      <line x1="500" y1="716" x2="340" y2="796" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="384" y="744" width="72" height="12" rx="2" fill="#f5f5f5"/>
      <text x="420" y="753" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SEMANTIC</text>

      <!-- A9: Embedding Index -> Search Index (semantic retrieval, same index as A8) -->
      <line x1="740" y1="716" x2="900" y2="796" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="784" y="744" width="72" height="12" rx="2" fill="#f5f5f5"/>
      <text x="820" y="753" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SEMANTIC</text>

      <!-- A10: App/Auth Server -> Search Index (permission-scoped queries, routed around the right margin) -->
      <polyline points="780,234 1180,234 1180,828 1100,828" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="1100" y="808" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="1140" y="817" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SCOPED QUERY</text>

      <!-- A11: App/Auth Server -> Graph Engine (permission-scoped queries, routed around the left margin) -->
      <polyline points="460,234 60,234 60,828 140,828" fill="none" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="60" y="808" width="80" height="12" rx="2" fill="#f5f5f5"/>
      <text x="100" y="817" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">SCOPED QUERY</text>

      <!-- ============ NODES ============ -->

      <!-- Node: Editor (Browser) : input -->
      <rect x="60" y="56" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="60" y="56" width="240" height="64" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="68" y="64" width="28" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="82" y="73" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">UI</text>
      <text x="180" y="92" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Editor (Browser)</text>
      <text x="180" y="108" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">codemirror 6 · frontmatter panel</text>

      <!-- Node: AI Agent (MCP Client) : external -->
      <rect x="940" y="56" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="940" y="56" width="240" height="64" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="948" y="64" width="32" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.22)" stroke-width="0.8"/>
      <text x="964" y="73" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">MCP</text>
      <text x="1060" y="92" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">AI Agent (MCP Client)</text>
      <text x="1060" y="108" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">scoped mcp connection</text>

      <!-- Node: App/Auth Server : focal -->
      <rect x="460" y="196" width="320" height="76" rx="6" fill="#f5f5f5"/>
      <rect x="460" y="196" width="320" height="76" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="468" y="204" width="36" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="486" y="213" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">AUTH</text>
      <text x="620" y="236" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">App / Auth Server</text>
      <text x="620" y="254" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">permission resolution · okf validation</text>

      <!-- Node: CRDT Sync Relay : backend -->
      <rect x="180" y="352" width="260" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="180" y="352" width="260" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="188" y="360" width="34" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="205" y="369" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SYNC</text>
      <text x="310" y="388" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">CRDT Sync Relay</text>
      <text x="310" y="404" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">per-operation validation</text>

      <!-- Node: Postgres (metadata) : store -->
      <rect x="800" y="352" width="260" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="800" y="352" width="260" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="808" y="360" width="26" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
      <text x="821" y="369" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DB</text>
      <text x="930" y="388" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Postgres (metadata)</text>
      <text x="930" y="404" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">users · vaults · shares · audit log</text>

      <!-- Node: Note Store (OKF files) : focal -->
      <rect x="460" y="496" width="320" height="76" rx="6" fill="#f5f5f5"/>
      <rect x="460" y="496" width="320" height="76" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="468" y="504" width="32" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="484" y="513" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OKF</text>
      <text x="620" y="536" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Note Store (OKF files)</text>
      <text x="620" y="554" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">markdown + yaml (source of truth)</text>

      <!-- Node: Embedding Index : store -->
      <rect x="460" y="652" width="320" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="460" y="652" width="320" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="468" y="660" width="30" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
      <text x="483" y="669" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">IDX</text>
      <text x="620" y="688" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Embedding Index</text>
      <text x="620" y="704" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">one per note, computed on save</text>

      <!-- Node: Graph Engine : backend -->
      <rect x="140" y="796" width="260" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="140" y="796" width="260" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="148" y="804" width="34" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="165" y="813" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">GRPH</text>
      <text x="270" y="832" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Graph Engine</text>
      <text x="270" y="848" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">extracted + inferred · leiden</text>

      <!-- Node: Search Index : backend -->
      <rect x="840" y="796" width="260" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="840" y="796" width="260" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="848" y="804" width="34" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="865" y="813" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SRCH</text>
      <text x="970" y="832" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Search Index</text>
      <text x="970" y="848" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">hybrid keyword + semantic</text>

      <!-- ============ LEGEND ============ -->
      <line x1="60" y1="912" x2="1180" y2="912" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="60" y="932" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="60" y="952" width="16" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="84" y="960" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Focal / auth + files</text>

      <rect x="240" y="952" width="16" height="12" rx="2" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <text x="264" y="960" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Input / browser</text>

      <rect x="420" y="952" width="16" height="12" rx="2" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="444" y="960" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">External / AI agent</text>

      <rect x="620" y="952" width="16" height="12" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="644" y="960" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Backend / service</text>

      <rect x="800" y="952" width="16" height="12" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="824" y="960" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Store / data</text>

      <line x1="960" y1="958" x2="988" y2="958" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="996" y="960" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">External / MCP call</text>
    </svg>
  </div>
</body>
</html>
