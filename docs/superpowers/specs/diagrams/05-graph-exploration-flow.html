<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Exploration</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">User flow · Chapters</p>
    <h1>Graph Exploration</h1>

    <svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(45,49,66,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ===== Arrows (drawn first, behind nodes) ===== -->

      <!-- Start -> Load graph -->
      <line x1="500" y1="88" x2="500" y2="120" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Load graph -> Coloring mode? -->
      <line x1="500" y1="168" x2="500" y2="200" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Coloring mode: TYPE/TAG (straight) -->
      <line x1="500" y1="296" x2="500" y2="328" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Coloring mode: COMMUNITY (elbow) -->
      <path d="M600,248 L600,328 L500,328" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Apply filter: NO (straight) -->
      <line x1="500" y1="424" x2="500" y2="456" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Apply filter: YES (elbow) -->
      <path d="M600,376 L600,456 L500,456" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Physics & style -> Merge cross-vault? -->
      <line x1="500" y1="504" x2="500" y2="536" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Merge cross-vault: NO (straight, to render) -->
      <line x1="500" y1="632" x2="500" y2="664" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Merge cross-vault: YES (coral, to resolve+draw) -->
      <line x1="600" y1="584" x2="720" y2="584" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- Resolve+draw -> render (elbow) -->
      <path d="M800,608 L800,664 L500,664" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- ===== Arrow labels (masked) ===== -->

      <rect x="474" y="304" width="52" height="12" rx="2" fill="#f5f5f5"/>
      <text x="500" y="313" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">TYPE/TAG</text>

      <rect x="524" y="316" width="60" height="12" rx="2" fill="#f5f5f5"/>
      <text x="554" y="325" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">COMMUNITY</text>

      <rect x="484" y="432" width="24" height="12" rx="2" fill="#f5f5f5"/>
      <text x="496" y="441" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>

      <rect x="530" y="444" width="28" height="12" rx="2" fill="#f5f5f5"/>
      <text x="544" y="453" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>

      <rect x="484" y="640" width="24" height="12" rx="2" fill="#f5f5f5"/>
      <text x="496" y="649" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>

      <rect x="646" y="572" width="28" height="12" rx="2" fill="#f5f5f5"/>
      <text x="660" y="581" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>

      <!-- ===== Nodes ===== -->

      <!-- Start oval -->
      <rect x="420" y="40" width="160" height="48" rx="24" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="500" y="68" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User opens vault</text>

      <!-- Process: Load vault graph -->
      <rect x="420" y="120" width="160" height="48" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="144" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Load vault graph</text>
      <text x="500" y="158" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">extracted + inferred</text>

      <!-- Diamond: Coloring mode? -->
      <polygon points="500,200 600,248 500,296 400,248" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="252" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Coloring mode?</text>

      <!-- Diamond: Apply filter? -->
      <polygon points="500,328 600,376 500,424 400,376" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="368" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Apply filter?</text>
      <text x="500" y="388" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">type · tags · date range</text>

      <!-- Process: Physics & style controls -->
      <rect x="420" y="456" width="160" height="48" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="480" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Physics &amp; style</text>
      <text x="500" y="494" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">force·dist·size·color</text>

      <!-- Diamond: Merge cross-vault? -->
      <polygon points="500,536 600,584 500,632 400,584" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="576" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Merge cross-vault?</text>
      <text x="500" y="596" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">gated by mergeable=ON</text>

      <!-- Process: Resolve access + draw edges (focal) -->
      <rect x="720" y="560" width="160" height="48" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="800" y="584" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cross-vault edges</text>
      <text x="800" y="598" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">re-resolves LIVE access</text>

      <!-- End oval -->
      <rect x="420" y="664" width="160" height="48" rx="24" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="500" y="688" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Rendered graph view</text>
      <text x="500" y="702" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">single-vault or merged</text>

      <!-- ===== Legend ===== -->
      <line x1="40" y1="744" x2="960" y2="744" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="760" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND · SHAPE CARRIES TYPE</text>

      <rect x="40" y="776" width="24" height="12" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="72" y="786" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Start / end (oval)</text>

      <rect x="220" y="776" width="24" height="12" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="252" y="786" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Step (rectangle)</text>

      <polygon points="412,782 424,776 436,782 424,788" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="448" y="786" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Decision (diamond)</text>

      <line x1="604" y1="784" x2="632" y2="784" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="640" y="786" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Live access re-check</text>

      <line x1="796" y1="784" x2="824" y2="784" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <text x="832" y="786" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Branch</text>
    </svg>
  </div>
</body>
</html>
