name: CI

on:
  pull_request:
  push:
    branches: [dev, prod]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: chapters
          POSTGRES_PASSWORD: chapters
          POSTGRES_DB: chapters
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chapters"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
